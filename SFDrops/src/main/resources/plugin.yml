name: SFDrops
version: 1.0.0
main: dev.sfdrops.SFDropsPlugin
api-version: '1.21'
authors: [LujuZk]
description: SpiritForge ore/log drop handling with rarity
softdepend: [Oraxen, SFCore, SkillTreePlugin, SFCrafting]

commands:
  sfdrops:
    description: SFDrops admin command
    usage: /sfdrops <reload|debug>
    permission: sfdrops.admin

permissions:
  sfdrops.admin:
    description: Access to SFDrops admin commands
    default: op